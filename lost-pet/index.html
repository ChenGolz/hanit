<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetConnect Israel</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../config.js"></script>
  <script src="../assets/app.js" defer></script>
</head>
<body data-page="lost">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../index.html" id="brand-text">PetConnect Israel</a>
      <div class="nav-actions">
        <a class="nav-link subtle" href="../matches/" data-i18n="liveMapNav"></a>
        <a class="nav-link volunteer-pill" href="../volunteer/" data-i18n="volunteerLogin"></a>
        <label class="lang-pill" for="language-select" data-i18n="language"></label>
        <select id="language-select" class="select" aria-label="language">
          <option value="he">עברית</option><option value="ar">العربية</option><option value="en">English</option>
        </select>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container grid form-layout">
      <div class="grid">
        <div class="stepper-card card">
          <div class="step-meta"><span data-i18n="stepLostLabel"></span><strong data-i18n="step1of3"></strong></div>
          <div class="progress"><span style="width:33%"></span></div>
        </div>

        <div class="card form-card lost-accent">
          <div class="section-head compact">
            <div>
              <h1 data-i18n="lostTitleNew"></h1>
              <p class="small" data-i18n="lostSubtitle"></p>
            </div>
          </div>
          <div class="notice warn" data-api-warning hidden></div>
          <form id="lost-form" enctype="multipart/form-data" class="grid">
            <div class="notice" hidden></div>
            <div class="tip-box"><strong data-i18n="photoTipTitle"></strong><span data-i18n="photoTip"></span></div>

            <div class="field"><label data-i18n="image"></label><input id="lost-image" name="image" type="file" accept="image/*" capture="environment"></div>
            <div class="field"><label data-i18n="video"></label><input name="video" type="file" accept="video/*" capture="environment"></div>
            <div class="field"><label data-i18n="nosePhoto"></label><input name="nose_image" type="file" accept="image/*" capture="environment"></div>
            <div class="field"><label data-i18n="privateMarkerPhoto"></label><input name="private_marker_image" type="file" accept="image/*" capture="environment"></div>
            <div class="preview preview-media" data-image-preview data-i18n-empty="previewEmpty"></div>

            <div class="form-grid">
              <div class="field"><label data-i18n="name"></label><input name="name"></div>
              <div class="field"><label data-i18n="animalType"></label><select name="animal_type"><option value="dog">Dog</option><option value="cat">Cat</option></select></div>
              <div class="field">
                <label data-i18n="breed"></label>
                <select name="breed" data-breed-select></select>
                <div class="breed-chips" data-breed-chips></div>
              </div>
              <div class="field"><label data-i18n="color"></label><input name="color"></div>
              <div class="field"><label data-i18n="collar"></label><input name="collar_description"></div>
              <div class="field"><label data-i18n="markings"></label><input name="unique_markings"></div>
              <div class="field"><label data-i18n="city"></label><input name="city"></div>
              <div class="field"><label data-i18n="neighborhood"></label><input name="neighborhood"></div>
              <div class="field"><label data-i18n="contactName"></label><input name="contact_name"></div>
              <div class="field"><label data-i18n="phone"></label><input name="contact_phone" inputmode="tel"></div>
              <div class="field"><label data-i18n="email"></label><input name="contact_email" type="email"></div>
              <div class="field"><label data-i18n="microchip"></label><input name="microchip_number"></div>
              <div class="field"><label>Latitude</label><input name="latitude"></div>
              <div class="field"><label>Longitude</label><input name="longitude"></div>
            </div>
            <div class="field"><label data-i18n="location"></label><input name="last_seen_location"></div>
            <div class="field"><label data-i18n="notes"></label><textarea name="notes"></textarea></div>
            <div class="form-grid">
              <div class="field"><label data-i18n="verificationPrompt"></label><input name="verification_prompt"></div>
              <div class="field"><label data-i18n="verificationAnswer"></label><input name="verification_answer"></div>
            </div>
            <div class="field"><label data-i18n="privateMarkerPrompt"></label><input name="private_marker_prompt"></div>
            <div class="note" data-i18n="verificationQuizHint"></div>
            <div class="actions sticky-actions"><button type="button" class="button" data-use-location data-i18n="useLocation"></button><button type="submit" class="button primary lost-fill" data-i18n="saveLost"></button></div>
          </form>
        </div>
      </div>

      <div class="grid side-column">
        <div class="card">
          <h2 data-i18n="communityTrustTitle"></h2>
          <div class="list trust-list">
            <div class="result-card"><strong data-i18n="trust1"></strong><div class="small" data-i18n="trust1t"></div></div>
            <div class="result-card"><strong data-i18n="trust2"></strong><div class="small" data-i18n="trust2t"></div></div>
            <div class="result-card"><strong data-i18n="trust3"></strong><div class="small" data-i18n="trust3t"></div></div>
          </div>
        </div>
        <div class="card"><div class="map" data-map></div></div>
        <div class="card"><div data-result class="list"></div></div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container" data-i18n="footer"></div></footer>
</body>
</html>
