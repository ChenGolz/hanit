<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetConnect Israel</title>
  <meta name="theme-color" content="#ff6b00">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="config.js"></script>
  <script src="assets/app.js" defer></script>
</head>
<body data-page="home">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" id="brand-text">PetConnect Israel</a>
      <div class="nav-actions">
        <a class="nav-link subtle" href="matches/" data-i18n="liveMapNav"></a>
        <a class="nav-link volunteer-pill" href="volunteer/" data-i18n="volunteerLogin"></a>
        <label class="lang-pill" for="language-select" data-i18n="language"></label>
        <select id="language-select" class="select" aria-label="language">
          <option value="he">עברית</option>
          <option value="ar">العربية</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <section class="hero hero-home">
      <div class="container hero-grid hero-home-grid">
        <div class="card hero-copy">
          <span class="badge" data-i18n="heroBadge"></span>
          <h1 class="title" data-i18n="heroTitle"></h1>
          <p class="lead" data-i18n="heroText"></p>
          <div class="search-shell">
            <label class="field-label" for="home-search" data-i18n="searchLabel"></label>
            <div class="search-row">
              <input id="home-search" class="search-input" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="">
              <button class="button ghost" id="home-search-button" type="button" data-i18n="searchButton"></button>
            </div>
          </div>
          <div class="small api-chip"><strong data-i18n="apiBase"></strong>: <span class="code" data-api-url></span></div>
          <div class="notice warn" data-api-warning hidden></div>
        </div>

        <div class="hero-cta-stack">
          <div class="cta-panel emergency-panel">
            <div>
              <div class="eyebrow" data-i18n="emergencyEyebrow"></div>
              <h2 data-i18n="emergencyTitle"></h2>
              <p class="small" data-i18n="emergencyText"></p>
            </div>
            <button id="home-camera-button" class="button emergency-button" type="button" data-i18n="emergencyButton"></button>
            <input id="home-camera-input" type="file" accept="image/*" capture="environment" hidden>
          </div>

          <div class="cta-split">
            <a class="cta-card lost-card" href="lost-pet/">
              <span class="cta-icon">🔵</span>
              <strong data-i18n="lostBig"></strong>
              <span class="small" data-i18n="lostSmall"></span>
            </a>
            <a class="cta-card found-card" href="found-pet/">
              <span class="cta-icon">🟢</span>
              <strong data-i18n="foundBig"></strong>
              <span class="small" data-i18n="foundSmall"></span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container grid grid-3">
        <div class="card feature-card">
          <div class="feature-icon">📸</div>
          <h3 data-i18n="featureCamera"></h3>
          <p class="small" data-i18n="featureCameraText"></p>
        </div>
        <div class="card feature-card">
          <div class="feature-icon">📍</div>
          <h3 data-i18n="featureGeo"></h3>
          <p class="small" data-i18n="featureGeoText"></p>
        </div>
        <div class="card feature-card">
          <div class="feature-icon">⚡</div>
          <h3 data-i18n="featureInstant"></h3>
          <p class="small" data-i18n="featureInstantText"></p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container grid grid-2">
        <div class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="liveMapTitle"></h2>
              <p class="small" data-i18n="liveMapText"></p>
            </div>
            <a class="button ghost" href="matches/" data-i18n="openMap"></a>
          </div>
          <div class="map" id="home-map"></div>
        </div>
        <div class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="storiesTitle"></h2>
              <p class="small" data-i18n="storiesText"></p>
            </div>
          </div>
          <div class="stories-grid" id="stories-grid"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container card">
        <div class="section-head">
          <div>
            <h2 data-i18n="cityTitle"></h2>
            <p class="small" data-i18n="cityText"></p>
          </div>
        </div>
        <div class="city-grid" data-city-grid></div>
      </div>
    </section>
  </main>

  <footer class="footer"><div class="container" data-i18n="footer"></div></footer>
</body>
</html>
