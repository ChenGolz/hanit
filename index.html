<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Israel PetConnect AI</title>
  <meta name="theme-color" content="#0f766e">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="config.js"></script>
  <script src="assets/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" id="brand-text">Israel PetConnect AI</a>
      <div class="nav-links">
        <a class="nav-link" href="index.html" data-i18n="home"></a>
        <a class="nav-link primary" href="found-pet/" data-i18n="found"></a>
        <a class="nav-link" href="lost-pet/" data-i18n="lost"></a>
        <a class="nav-link" href="matches/" data-i18n="matches"></a>
        <a class="nav-link" href="volunteer/" data-i18n="volunteer"></a>
        <a class="nav-link" href="shelter/" data-i18n="shelter"></a>
        <select id="language-select" class="select"><option value="he">עברית</option><option value="ar">العربية</option><option value="en">English</option></select>
      </div>
    </div>
  </header>
  <main>
<section class="hero">
  <div class="container hero-grid">
    <div class="card">
      <span class="badge" data-i18n="heroBadge"></span>
      <h1 class="title" data-i18n="heroTitle"></h1>
      <p class="lead" data-i18n="heroText"></p>
      <div class="button-row">
        <a class="button primary" href="found-pet/" data-i18n="oneTap"></a>
        <a class="button" href="lost-pet/" data-i18n="reportLost"></a>
        <a class="button" href="matches/" data-i18n="checkMatches"></a>
        <a class="button" href="volunteer/" data-i18n="joinVolunteer"></a>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h3 data-i18n="worksNow"></h3>
        <p class="small" data-i18n="worksNowText"></p>
        <div class="notice warn" data-api-warning hidden></div>
        <div class="small"><strong data-i18n="apiBase"></strong>: <span class="code" data-api-url></span></div>
      </div>
      <div class="card">
        <div class="kpis">
          <div class="kpi"><strong>100%</strong><span data-i18n="stats1"></span></div>
          <div class="kpi"><strong>3</strong><span data-i18n="stats2"></span></div>
          <div class="kpi"><strong>✅</strong><span data-i18n="stats3"></span></div>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section"><div class="container"><div class="grid grid-3">
  <div class="card"><h3 data-i18n="feature1"></h3><p class="small" data-i18n="feature1t"></p></div>
  <div class="card"><h3 data-i18n="feature2"></h3><p class="small" data-i18n="feature2t"></p></div>
  <div class="card"><h3 data-i18n="feature3"></h3><p class="small" data-i18n="feature3t"></p></div>
  <div class="card"><h3 data-i18n="feature4"></h3><p class="small" data-i18n="feature4t"></p></div>
  <div class="card"><h3 data-i18n="feature5"></h3><p class="small" data-i18n="feature5t"></p></div>
  <div class="card"><h3 data-i18n="feature6"></h3><p class="small" data-i18n="feature6t"></p></div>
</div></div></section>
<section class="section"><div class="container"><div class="card"><h2 data-i18n="cityTitle"></h2><div class="city-grid" data-city-grid></div></div></div></section>
</main>
  <footer class="footer"><div class="container" data-i18n="footer"></div></footer>
</body>
</html>
