<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PetConnect">
  <title>Israel PetConnect AI</title>
  <meta name="theme-color" content="#0f766e">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../config.js"></script>
  <script src="../assets/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../index.html" id="brand-text">Israel PetConnect AI</a>
      <div class="nav-links">
        <a class="nav-link" href="../index.html" data-i18n="home"></a>
        <a class="nav-link primary" href="../found-pet/" data-i18n="found"></a>
        <a class="nav-link" href="../lost-pet/" data-i18n="lost"></a>
        <a class="nav-link" href="../matches/" data-i18n="matches"></a>
        <a class="nav-link" href="../volunteer/" data-i18n="volunteer"></a>
        <a class="nav-link" href="../shelter/" data-i18n="shelter"></a>
        <select id="language-select" class="select"><option value="he">עברית</option><option value="ar">العربية</option><option value="en">English</option></select>
      </div>
    </div>
  </header>
  <main class="section"><div class="container grid grid-2"><div class="card"><h1 data-i18n="volunteerTitle"></h1><div class="notice warn" data-api-warning hidden></div><form id="volunteer-form" class="grid"><div class="notice" hidden></div><div class="form-grid"><div class="field"><label data-i18n="contactName"></label><input name="name"></div><div class="field"><label data-i18n="phone"></label><input name="phone"></div><div class="field"><label data-i18n="email"></label><input name="email"></div><div class="field"><label data-i18n="city"></label><input name="city"></div><div class="field"><label data-i18n="neighborhood"></label><input name="neighborhood"></div><div class="field"><label data-i18n="radiusKm"></label><input name="radius_km" type="number" step="0.5" value="2.5"></div><div class="field"><label>Latitude</label><input name="latitude"></div><div class="field"><label>Longitude</label><input name="longitude"></div></div><div class="actions"><button type="button" class="button" data-use-location data-i18n="useLocation"></button><button type="submit" class="button primary" data-i18n="saveVolunteer"></button></div></form></div><div class="card"><div class="map" data-map></div></div></div></main>
  <footer class="footer"><div class="container" data-i18n="footer"></div></footer>

  <div id="loading-spinner" class="loading-overlay" hidden><div class="loading-card"><div class="loading-dots" aria-hidden="true"></div><div data-loading-text data-i18n="scanningFace">סורק פנים...</div></div></div>
</body>
</html>
